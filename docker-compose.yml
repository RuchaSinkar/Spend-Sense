services:
  postgres:
    image: postgres:15-alpine
    container_name: spendsense-db
    environment:
      POSTGRES_DB: spendsense
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin123
    ports:
      - "5434:5432"
  redis:
    image: redis:7-alpine
    container_name: spendsense-redis
    ports:
      - "6381:6379"
